services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: browniebee-api
    env_file:
      - ./api/.env
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: browniebee-frontend
    depends_on:
      - api
    ports:
      - "18080:80"
    restart: unless-stopped
